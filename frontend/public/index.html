<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0E0E0E" />
        <meta name="description" content="ETLAWM - Pure Herbal Hair & Face Care Routine" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
        <title>ETLAWM | Pure Herbal Hair & Face Care</title>

        <style>
            /* ── ETLAWM Splash Screen ── */
            #etlawm-splash {
                position: fixed;
                inset: 0;
                z-index: 99999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background-color: #0E0E0E;
                gap: 0;
                overflow: hidden;
                /* fade out after 2.4 s, duration 0.7 s */
                animation: splash-fade-out 0.7s cubic-bezier(0.4, 0, 0.2, 1) 2.4s forwards;
            }

            /* ambient radial glow */
            #etlawm-splash::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(
                    ellipse 70% 55% at 50% 45%,
                    rgba(200, 169, 122, 0.09) 0%,
                    transparent 70%
                );
                pointer-events: none;
            }

            /* top rule */
            #etlawm-splash::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(200,169,122,0.25), transparent);
            }

            .splash-wordmark {
                font-family: 'Inter', sans-serif;
                font-size: clamp(3.2rem, 10vw, 7.5rem);
                font-weight: 800;
                letter-spacing: -0.04em;
                line-height: 0.9;
                color: rgba(255, 255, 255, 0.06);
                user-select: none;
                position: relative;
                /* reveal animation */
                animation: wordmark-reveal 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
            }

            /* the filled, visible letters clip over the ghost */
            .splash-wordmark span {
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    #ffffff 0%,
                    rgba(255,255,255,0.75) 60%,
                    rgba(200,169,122,0.9) 100%
                );
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                opacity: 0;
                animation: brand-fill 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
            }

            .splash-tagline {
                font-family: 'Inter', sans-serif;
                font-size: clamp(0.55rem, 1.5vw, 0.7rem);
                font-weight: 600;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: rgba(200, 169, 122, 0.75);
                margin-top: 22px;
                opacity: 0;
                animation: tagline-in 0.8s ease 1.1s forwards;
            }

            /* progress bar */
            .splash-bar-wrap {
                position: absolute;
                bottom: 48px;
                left: 50%;
                transform: translateX(-50%);
                width: 60px;
                height: 1px;
                background: rgba(255,255,255,0.1);
                overflow: hidden;
                border-radius: 1px;
            }

            .splash-bar {
                height: 100%;
                background: linear-gradient(90deg, rgba(200,169,122,0.6), rgba(200,169,122,1));
                border-radius: 1px;
                animation: bar-fill 2.1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
                width: 0;
            }

            /* ── keyframes ── */
            @keyframes splash-fade-out {
                0%   { opacity: 1; transform: scale(1); }
                100% { opacity: 0; transform: scale(1.015); pointer-events: none; }
            }

            @keyframes wordmark-reveal {
                0%   { opacity: 0; transform: translateY(18px); }
                100% { opacity: 1; transform: translateY(0); }
            }

            @keyframes brand-fill {
                0%   { opacity: 0; }
                100% { opacity: 1; }
            }

            @keyframes tagline-in {
                0%   { opacity: 0; transform: translateY(6px); }
                100% { opacity: 1; transform: translateY(0); }
            }

            @keyframes bar-fill {
                0%   { width: 0; }
                100% { width: 100%; }
            }
        </style>
    </head>
    <body>
        <!-- ETLAWM Splash / Loading Screen -->
        <div id="etlawm-splash" aria-hidden="true" role="presentation">
            <div class="splash-wordmark">
                ETLAWM.
                <span>ETLAWM.</span>
            </div>
            <div class="splash-tagline">Herbal Rituals</div>
            <div class="splash-bar-wrap">
                <div class="splash-bar"></div>
            </div>
        </div>

        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

        <script>
            // Remove splash from DOM after fade-out completes (2.4s delay + 0.7s animation)
            (function () {
                var splash = document.getElementById('etlawm-splash');
                if (splash) {
                    setTimeout(function () {
                        if (splash.parentNode) splash.parentNode.removeChild(splash);
                    }, 3200);
                }
            })();
        </script>
    </body>
</html>
